server {
    listen 80;
    server_name athena.sonance.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name athena.sonance.dev;

    ssl_certificate     /etc/letsencrypt/live/athena.sonance.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/athena.sonance.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /api/messages {
        proxy_pass http://athena:3978;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://athena:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

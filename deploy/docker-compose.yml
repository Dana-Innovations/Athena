services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      athena:
        condition: service_healthy
    restart: unless-stopped

  athena:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.athena
    env_file: ./.env
    environment:
      HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_GATEWAY_BIND: lan
      ATHENA_PROFILE_DIR: /data/profiles
    volumes:
      - gateway-data:/home/node/.openclaw
      - profiles:/data/profiles
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
    ports:
      - "3978:3978"
      - "18789:18789"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3G
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]

volumes:
  gateway-data:
  profiles:

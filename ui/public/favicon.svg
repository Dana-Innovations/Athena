<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb-grad" cx="0.35" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#4dc9ff"/>
      <stop offset="50%" stop-color="#00A3E1"/>
      <stop offset="100%" stop-color="#0070a8"/>
    </radialGradient>
    <radialGradient id="orb-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="#00A3E1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00A3E1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight" cx="0.4" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="30" fill="url(#orb-glow)"/>
  <!-- Main sphere -->
  <circle cx="32" cy="32" r="22" fill="url(#orb-grad)"/>
  <!-- Specular highlight -->
  <ellipse cx="26" cy="24" rx="8" ry="5" fill="url(#highlight)"/>
</svg>
